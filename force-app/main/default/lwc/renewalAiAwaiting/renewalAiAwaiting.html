<template>
    <lightning-card>
        <div class="slds-align_absolute-center slds-p-around_large">
            <div class="slds-text-align_center">
                <template if:true={isLoading}>
                    <lightning-spinner
                        alternative-text="Loading"
                        size="large"
                        variant="brand">
                    </lightning-spinner>
                </template>
                
                <template if:false={isLoading}>
                    <lightning-icon
                        icon-name="utility:success"
                        alternative-text="Success"
                        size="large"
                        variant="success"
                        class="slds-m-bottom_small">
                    </lightning-icon>
                </template>
                
                <div class="slds-text-heading_medium slds-m-top_medium">
                    {displayMessage}
                </div>
                
                <template if:true={isLoading}>
                    <div class="slds-text-body_small slds-m-top_small slds-text-color_weak">
                        Checking for updates...
                    </div>
                </template>
            </div>
        </div>
    </lightning-card>
</template>
