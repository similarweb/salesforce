<template>
    <div class="funky-button-container">
        <button class="funky-button" onclick={openModal}>{buttonLabel}</button>
    </div>

    <template if:true={isModalOpen}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <!-- Modal Header with "X" button -->
                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                            title="Close" onclick={closeModal}>
                        <lightning-icon icon-name="utility:close" alternative-text="close" size="small"></lightning-icon>
                        <span class="slds-assistive-text">Close</span>
                    </button>
                    <h2 class="slds-text-heading_medium">Start Flow</h2>
                </header>

                <!-- Modal Body -->
                <div class="slds-modal__content slds-p-around_medium">
                    <lightning-flow flow-api-name={flowName}
                                    flow-input-variables={flowVariables}
                                    onstatuschange={handleFlowStatusChange}>
                    </lightning-flow>
                </div>

                <!-- Modal Footer -->
                <!-- No Close button here -->
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
